set -g default-terminal "screen-256color"

set -g set-clipboard on

set -g focus-events on
set -g mouse on

# undercurls
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-features ",xterm-256color:RGB"
# Enable RGB for panes (default-terminal is screen-256color); needed for Atuin #hex themes etc.
set -ag terminal-features ",*:RGB"

# Ctrl-s prefix key. Default => C-b. Send C-s with repeat option via C-s C-s
unbind-key C-b
set -g prefix C-s
bind -r C-s send-prefix
bind-key -n c-w send-prefix
bind -n C-k send-keys -R

# open new panes with the cwd
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# window/pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g display-panes-time 350

# Keep plenty of history for scrollback
set -g history-limit 100000

# Use emacs / readline key-bindings at the tmux command prompt `<prefix>:`
set -g status-keys emacs

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# activity
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell on
set -g visual-silence on

# vim-like copy mode bindings
bind-key -T copy-mode-vi v send -X begin-selection
unbind -T copy-mode-vi Enter
unbind -T copy-mode-vi Space
bind -T copy-mode-vi y send -X copy-selection-and-cancel 
bind -T copy-mode-vi Escape send -X cancel 

# Clear
bind C-l send-keys 'C-l'

# Fullscreen a pane
bind-key f resize-pane -Z

# Reload config (avoid C-r: tmux-resurrect uses prefix+C-r for restore by default;
# we bind restore to prefix+Shift+R and save to prefix+Shift+S — see plugin block)
bind o source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# bind resizing of panes to H,J,K,L (resizes by steps of 10 lines/columns)
bind -n S-Left resize-pane -L 4
bind -n S-Right resize-pane -R 4
bind -n S-Down resize-pane -D 2
bind -n S-Up resize-pane -U 2

# Pane Navigation with Alt + Arrow Keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Toggle input broadcast to all panes
bind -n C-b set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Continuum must load LAST: it hooks status-right for periodic save; Catppuccin (and
# similar themes) replace status-right and would break auto-save if loaded after Continuum.
# Prefix is C-s, so resurrect defaults (C-s save / C-r restore) conflict — use Shift+S / Shift+R.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'macchiato'
# Always render tab titles from the pane's current path (never #T, which programs
# like Claude Code and zsh set freely). See ~/.dotfiles/bin/tmux-window-title for
# the ~/workspace/folder_name vs …folder_name/leaf formatting rule. Set before TPM
# loads so catppuccin's set -ogq defaults don't win.
set -g @catppuccin_window_text ' #(~/.dotfiles/bin/tmux-window-title "#{pane_current_path}")'
set -g @catppuccin_window_current_text ' #(~/.dotfiles/bin/tmux-window-title "#{pane_current_path}")'
# Tint the inactive tab toward the active lavender family (instead of the theme's
# neutral surface/overlay grays), matching the inactive pane border + title chip.
# Keeps Catppuccin's light-number / dark-body two-tone: a lighter periwinkle number
# segment (#696e96) over a dark periwinkle body (#4a4d70, same as the pane chip).
set -g @catppuccin_window_number_color '#696e96'
set -g @catppuccin_window_text_color '#4a4d70'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'
run '~/.tmux/plugins/tpm/tpm'

# Pane borders with a per-pane title: the running process name + its run time.
# pane_current_command can report a program's self-set arg0 (Claude Code shows
# its version string, etc.), so the title is rendered by ~/.dotfiles/bin/tmux-pane-title,
# which reads the pane's tty and reports the foreground process-group leader's
# name and elapsed run time. Refreshes on status-interval. Set after TPM so it
# wins over Catppuccin's pane-border defaults; border colors are left to the theme.
set -g pane-border-status top
# Draw borders with double-line UTF-8 box characters (╔═╗ ║ ╚╝). tmux only
# supports its preset line styles here — single / double / heavy / simple /
# number — not arbitrary glyphs.
set -g pane-border-lines double
# Tint the inactive border toward the active lavender (#b4befe) instead of the
# theme's neutral gray, so the two harmonize. This is lavender blended ~35% over
# the Catppuccin base (#1e1e2e) — dark enough to stay deemphasized. The active
# border keeps Catppuccin's brighter lavender (pane-active-border-style).
set -g pane-border-style fg=#535677
# Render the title as a filled "chip" so it doesn't wash out against the border
# line. The active pane gets the lavender accent (matching pane-active-border-style)
# with dark bold text; inactive panes get a dark periwinkle chip (same blue/purple
# family as the border tint above) with light text, so the two harmonize.
set -g pane-border-format '#[fg=#{?pane_active,#11111b,#cdd6f4},bg=#{?pane_active,#b4befe,#4a4d70},bold] #(~/.dotfiles/bin/tmux-pane-title "#{pane_tty}") #[default]'

