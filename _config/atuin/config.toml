# Atuin — shell history manager (https://docs.atuin.sh)

# UI
dialect = "us"
timezone = "local"
search_mode = "daemon-fuzzy"
filter_mode = "global"
style = "full"
show_preview = true
exit_mode = "return-original"

# ^R behavior: shell-up uses global filter, search defaults to fuzzy.
filter_mode_shell_up_key_binding = "global"
search_mode_shell_up_key_binding = "fuzzy"

# Don't record secrets-y commands automatically.
history_filter = [
  "^secret",
  "^export .*TOKEN",
  "^export .*SECRET",
  "^export .*PASSWORD",
  "^export .*API_KEY",
]

[keys]
scroll_exits = true
exit_past_line_start = true
accept_past_line_end = true
accept_past_line_start = false
accept_with_backspace = false

[search]
filters = ["global", "session", "workspace", "directory"]

[ui]
columns = ["directory", "command"]

[theme]
name = "catppuccin-frappe-lavender"

# Background daemon handles sync. To enable against a self-hosted server:
#   1. Set `sync_address` below
#   2. `atuin register -u <username> -e <email> -p <password>`
#   3. `atuin import auto`
#   4. `atuin sync`
sync_address = "https://atuin.wilhall.com"
[daemon]
enabled = true
autostart = true
sync_frequency = 300  # seconds

[sync]
records = true
